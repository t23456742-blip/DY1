name: Build TrollStore IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: DouYinCleaner
        run: |
          xcodegen generate
          echo "=== 检查生成的文件 ==="
          ls -la DouYinCleaner.xcodeproj/

      - name: Build archive
        working-directory: DouYinCleaner
        run: |
          xcodebuild archive \
            -project DouYinCleaner.xcodeproj \
            -scheme DouYinCleaner \
            -archivePath ../build/DouYinCleaner.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates 2>&1 | tail -30

      -name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/DouYinCleaner.xcarchive/Products/Applications/DouYinCleaner.app Payload/
          zip -qr DouYinCleaner.tipa Payload
          ls -lh DouYinCleaner.tipa

      - name: Upload IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: DouYinCleaner.tipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
