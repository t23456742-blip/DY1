name: Build TrollStore IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build IPA
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          set -e
          brew install xcodegen
          cd DouYinCleaner
          xcodegen generate

          xcodebuild archive \
            -project DouYinCleaner.xcodeproj \
            -scheme DouYinCleaner \
            -archivePath build/DouYinCleaner.xcarchive \
            -destination "generic/platform=iOS" \
            -configuration Debug \
            SWIFT_COMPILATION_MODE=singlefile \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates

          mkdir -p Payload
          cp -r build/DouYinCleaner.xcarchive/Products/Applications/DouYinCleaner.app Payload/
          zip -qr DouYinCleaner.tipa Payload
          ls -lh DouYinCleaner.tipa
          echo "DONE"

      - name: Upload IPA
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: DouYinCleaner/DouYinCleaner.tipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
