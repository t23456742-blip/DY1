name: DouYinCleaner
options:
  bundleIdPrefix: com.douyin.cleaner
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    INFOPLIST_FILE: Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.douyin.cleaner
    PRODUCT_NAME: "DouYinCleaner"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  DouYinCleaner:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "抖音清理"
        CODE_SIGN_ENTITLEMENTS: Entitlements.plist
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) TROLLSTORE"
